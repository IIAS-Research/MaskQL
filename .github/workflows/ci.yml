name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      COMPOSE_PROJECT_NAME: maskql-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
          cache: maven

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build Trino plugin
        run: bash ./scripts/build-trino-plugin.sh

      - name: Prepare test environment
        run: |
          cp ./.env.example ./.env
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Pre-pull published images
        run: |
          docker pull docker.io/rudymerieux/maskql:latest
          docker pull docker.io/rudymerieux/maskql-trino:latest

      - name: Run tests
        run: uv run tox

      - name: Upload tox logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: tox-logs
          path: .tox/**/log/**
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Release
    needs: tests
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Force release branch to workflow SHA
        run: git reset --hard ${{ github.sha }}

      - name: Create semantic release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: github-actions
          git_committer_email: actions@users.noreply.github.com

      - name: Write release summary
        if: ${{ always() }}
        env:
          RELEASED: ${{ steps.release.outputs.released }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          {
            echo "## Release"
            echo
            if [ "$RELEASED" = "true" ]; then
              echo "Published $RELEASE_TAG ($RELEASE_VERSION)."
            else
              echo "No new semantic release was published."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
