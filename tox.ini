[tox]
env_list = int
requires = tox>=4

[testenv:int]
description = Up (make), healthcheck Trino, unittest, down
package = skip
skip_install = true
basepython = python3

passenv =
    DOCKER_HOST
    TRINO_URL
    HF_TOKEN
setenv =
    MASKQL_HOST=localhost
    MASKQL_PORT=443
    MASKQL_CATALOG=demo
    MASKQL_SCHEMA=public
    TLS_DIR={toxinidir}/certs
    REQUESTS_CA_BUNDLE={toxinidir}/certs/cert.pem
allowlist_externals =
    curl
    make
    uv
    sleep
    timeout
    mkdir
    openssl
commands_pre =
    mkdir -p certs
    openssl req -x509 -newkey rsa:2048 -nodes -days 7 \
        -keyout certs/key.pem \
        -out certs/cert.pem \
        -subj "/CN=localhost" \
        -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"

    make local-dev
    sleep 5
commands =
    uv run python -m unittest discover tests
commands_post =
    make down
