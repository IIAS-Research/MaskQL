[tox]
env_list = int
requires = tox>=4

[testenv:int]
description = Up (make), healthcheck Trino, unittest, down
package = skip
skip_install = true
basepython = python3

passenv =
    DOCKER_HOST
    TRINO_URL
setenv =
    MASKQL_HOST=localhost
    MASKQL_PORT=8443
    MASKQL_USER=test
    MASKQL_PASSWORD=test
    MASKQL_CATALOG=test_db
    MASKQL_SCHEMA=public
    TLS_DIR={toxinidir}/maskql/tls
    REQUESTS_CA_BUNDLE ={toxinidir}/maskql/tls/cert.pem
allowlist_externals =
    curl
    make
    uv
    sleep
    timeout
    mkdir
    openssl
commands_pre =
    mkdir -p maskql/tls
    openssl req -x509 -newkey rsa:2048 -nodes -days 7 \
        -keyout maskql/tls/key.pem \
        -out maskql/tls/cert.pem \
        -subj "/CN=localhost" \
        -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"

    make local-build
    # Wait for everything to start
    timeout 120 bash -c 'until [ "$(curl -sfk -u admin:admin https://{env:MASKQL_HOST}:{env:MASKQL_PORT}/v1/info | grep -o "\"starting\":[^,}]*" | cut -d: -f2 | tr -d " \t")" = "false" ]; do sleep 2; done'
    sleep 5
commands =
    uv run python -m unittest discover tests
commands_post =
    make down
