[tox]
env_list = int
requires = tox>=4

[testenv:int]
description = Up (make), healthcheck Trino, unittest, down
package = skip
skip_install = true
basepython = python3

passenv =
    DOCKER_HOST
    TRINO_URL
    HF_TOKEN
    HOST_UID
    HOST_GID
setenv =
    COMPOSE_PROJECT_NAME=maskql-tox
    MASKQL_HOST=localhost
    MASKQL_PORT=443
    MASKQL_ADMIN_USER=admin
    MASKQL_ADMIN_PASSWORD=admin
    MASKQL_ENCRYPT_PASSWORD=change-me-16+chars
    API_VERIFY_SSL=false
    TRINO_VERIFY_SSL=false
    TLS_DIR={toxinidir}/certs
allowlist_externals =
    bash
    curl
    docker
    sh
    uv
    sleep
    timeout
    mkdir
    openssl
commands_pre =
    mkdir -p certs
    
    
    openssl req -x509 -newkey rsa:2048 -nodes -days 365 \
        -keyout certs/ca.key.pem \
        -out certs/ca.crt.pem \
        -subj "/CN=maskql-local-CA" \
        -addext "basicConstraints=critical,CA:TRUE,pathlen:0" \
        -addext "keyUsage=critical,keyCertSign,cRLSign"

    openssl req -new -newkey rsa:2048 -nodes \
        -keyout certs/server.key.pem \
        -out certs/server.csr.pem \
        -subj "/CN=localhost" \
        -addext "subjectAltName=DNS:localhost,IP:127.0.0.1" \
        -addext "keyUsage=critical,digitalSignature,keyEncipherment" \
        -addext "extendedKeyUsage=serverAuth"

    sh -c "printf '%s\n%s\n%s\n' \
        'subjectAltName=DNS:localhost,IP:127.0.0.1' \
        'keyUsage=critical,digitalSignature,keyEncipherment' \
        'extendedKeyUsage=serverAuth' > certs/server.ext"

    openssl x509 -req -days 7 \
        -in certs/server.csr.pem \
        -CA certs/ca.crt.pem -CAkey certs/ca.key.pem -CAcreateserial \
        -out certs/server.crt.pem \
        -extfile certs/server.ext

    bash ./scripts/build-trino-plugin.sh
    docker compose --file ./compose.dev.yml --profile dev --env-file ./.env up -d
    timeout 180 sh -c 'until [ "$(docker inspect "${COMPOSE_PROJECT_NAME}-trino-1" --format "{{if .State.Health}}{{.State.Health.Status}}{{else}}starting{{end}}" 2>/dev/null || true)" = "healthy" ] && [ "$(docker inspect "${COMPOSE_PROJECT_NAME}-maskql-dev-1" --format "{{if .State.Health}}{{.State.Health.Status}}{{else}}starting{{end}}" 2>/dev/null || true)" = "healthy" ] && [ "$(docker inspect "${COMPOSE_PROJECT_NAME}-reverse-proxy-1" --format "{{if .State.Health}}{{.State.Health.Status}}{{else}}starting{{end}}" 2>/dev/null || true)" = "healthy" ]; do sleep 2; done'
commands =
    uv run python -m unittest discover tests
