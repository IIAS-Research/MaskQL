networks:
  private: {}
  public: {}

services:
  postgres:
    image: postgres:16
    networks: [private]
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo
    volumes:
      - ./tests/postgresql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  # ai:
  #   image: python:3.11-slim
  #   working_dir: /app
  #   command: sh -c "pip install fastapi uvicorn && uvicorn app:app --host 0.0.0.0 --port 8000"
  #   volumes:
  #     - ./ai/app.py:/app/app.py:ro
  #   ports: ["8000:8000"]

  trino:
    image: trinodb/trino:476
    networks: [private]
    environment:
      JAVA_TOOL_OPTIONS: "-DAI_MASK_URL=http://ai:8000/mask"
      TRINO_SHARED_SECRET: "/wasSj8niUsV5si9fnXiRC7nfM2p2acptOh2Jfqoz6o="
    volumes:
      - ./trino/etc-template:/etc/trino:ro
      # - ./plugins/ai-udf:/usr/lib/trino/plugin/ai-udf:ro
    depends_on: [postgres] #, ai]

  maskql:
    build: ./maskql
    depends_on: [trino]
    networks: [private, public]
    environment:
      - TRINO_URL=http://trino:8080
      - DEMO_USER=admin
      - DEMO_PASS=admin
    volumes:
      - ./maskql/tls:/etc/maskql/tls:ro
    ports:
      - "8443:8443"   # HTTPS if certs exist
      - "8081:8081"   # fallback HTTP if no certs
    restart: unless-stopped
