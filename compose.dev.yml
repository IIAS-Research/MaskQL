networks:
  public:
    name: "${COMPOSE_PROJECT_NAME:-maskql}_public"
  private:
    name: "${COMPOSE_PROJECT_NAME:-maskql}_private"
    internal: true

volumes:
  trino_data:
  pgdata:
  node_modules_front:

secrets:
  HF_TOKEN:
    environment: HF_TOKEN

services:
  reverse-proxy:
    image: traefik:v2.10
    networks: [public, private]
    command:
      - --entrypoints.websecure.address=:443
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=${COMPOSE_PROJECT_NAME:-maskql}_public
      - --providers.file.filename=/dynamic/tls.yml
      - --providers.file.watch=true
      - --accesslog=true
      - --accesslog.format=json
      - --api.insecure=true
      - --ping=true
      - --ping.entryPoint=traefik
    ports:
      - "${MASKQL_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/certs:ro
      - ./tls.yml:/dynamic/tls.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    image: docker.io/rudymerieux/maskql-frontend:${MASKQL_IMAGE_TAG:-latest}
    build: ./frontend
    profiles: [prod]
    labels:
      - traefik.enable=true
      - traefik.docker.network=${COMPOSE_PROJECT_NAME:-maskql}_public
      - traefik.http.routers.front.rule=Host(`${MASKQL_HOST}`) && PathPrefix(`/`) && !PathPrefix(`/api`) && !PathPrefix(`/v1`)
      - traefik.http.routers.front.entrypoints=websecure
      - traefik.http.services.front.loadbalancer.server.port=80
      - traefik.http.middlewares.front-compress.compress=true
      - traefik.http.routers.front.tls=true
    networks: [private]
    depends_on: [reverse-proxy]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 20s
      timeout: 3s
      retries: 10
      start_period: 5s
      
  frontend-dev:
    profiles: [dev]
    image: node:18-alpine
    working_dir: /app
    command: sh -c "if [ ! -x node_modules/.bin/vite ]; then npm ci; fi && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE: "/api"
      APP_HOST: ${MASKQL_HOST}
      NPM_CONFIG_CACHE: /tmp/.npm
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - node_modules_front:/app/node_modules
    labels:
      - traefik.enable=true
      - traefik.docker.network=${COMPOSE_PROJECT_NAME:-maskql}_public
      - traefik.http.routers.frontdev.rule=Host(`${MASKQL_HOST}`) && PathPrefix(`/`) && !PathPrefix(`/api`) && !PathPrefix(`/v1`)
      - traefik.http.routers.frontdev.entrypoints=websecure
      - traefik.http.routers.frontdev.tls=true
      - traefik.http.services.frontdev.loadbalancer.server.port=5173
    networks: [private, public]
    depends_on: [reverse-proxy]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ > /dev/null || exit 1"]
      interval: 20s
      timeout: 3s
      retries: 10
      start_period: 5s

  maskql:
    profiles: [prod]
    build: ./maskql
    image: docker.io/rudymerieux/maskql:${MASKQL_IMAGE_TAG:-latest}
    depends_on:
      trino:
        condition: service_healthy
      reverse-proxy:
        condition: service_healthy
    networks: [private]
    environment:
      TRINO_URL: http://trino:8080
      MASKQL_ADMIN_USER: ${MASKQL_ADMIN_USER:-admin}
      MASKQL_ADMIN_PASSWORD: ${MASKQL_ADMIN_PASSWORD:-admin}
      MASKQL_JWT_SECRET: ${MASKQL_JWT_SECRET:-change-me}
      MASKQL_ADMIN_JWT_EXPIRE_MIN: "30"
      MASKQL_COOKIE_SAMESITE: "lax"
      MASKQL_COOKIE_SECURE: "true"
      TEST_ENV: "true"
    labels:
      - traefik.enable=true
      - traefik.docker.network=${COMPOSE_PROJECT_NAME:-maskql}_public
      - traefik.http.routers.api.rule=Host(`${MASKQL_HOST}`) && PathPrefix(`/api`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls=true
      - traefik.http.routers.api.priority=1000
      - traefik.http.routers.api.middlewares=api-strip,api-prefix
      - traefik.http.middlewares.api-strip.stripprefix.prefixes=/api
      - traefik.http.middlewares.api-prefix.headers.customrequestheaders.X-Forwarded-Prefix=/api
      - traefik.http.middlewares.api-prefix.headers.customrequestheaders.X-Forwarded-Proto=https


      # JDBC/CLI (raw /v1)
      - traefik.http.routers.trino.rule=Host(`${MASKQL_HOST}`) && PathPrefix(`/v1`)
      - traefik.http.routers.trino.entrypoints=websecure
      - traefik.http.routers.trino.tls=true
      - traefik.http.routers.trino.priority=1000

      - traefik.http.services.api.loadbalancer.server.port=8081
    restart: unless-stopped

  maskql-dev:
    profiles: [dev]
    build: ./maskql
    image: docker.io/rudymerieux/maskql:${MASKQL_IMAGE_TAG:-latest}
    depends_on:
      trino:
        condition: service_healthy
      reverse-proxy:
        condition: service_healthy
    networks:
      private:
        aliases:
          - maskql
    environment:
      TRINO_URL: http://trino:8080
      MASKQL_ADMIN_USER: ${MASKQL_ADMIN_USER:-admin}
      MASKQL_ADMIN_PASSWORD: ${MASKQL_ADMIN_PASSWORD:-admin}
      MASKQL_JWT_SECRET: ${MASKQL_JWT_SECRET:-change-me}
      MASKQL_ADMIN_JWT_EXPIRE_MIN: "30"
      MASKQL_COOKIE_SAMESITE: "lax"
      MASKQL_COOKIE_SECURE: "true"
      TEST_ENV: "true"
      UVICORN_RELOAD: "true"
      RELOAD_DIR: /app/maskql
    volumes:
      - ./maskql:/app/maskql
    labels:
      - traefik.enable=true
      - traefik.docker.network=${COMPOSE_PROJECT_NAME:-maskql}_public
      - traefik.http.routers.api.rule=Host(`${MASKQL_HOST}`) && PathPrefix(`/api`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls=true
      - traefik.http.routers.api.priority=1000
      - traefik.http.routers.api.middlewares=api-strip,api-prefix
      - traefik.http.middlewares.api-strip.stripprefix.prefixes=/api
      - traefik.http.middlewares.api-prefix.headers.customrequestheaders.X-Forwarded-Prefix=/api
      - traefik.http.middlewares.api-prefix.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.routers.trino.rule=Host(`${MASKQL_HOST}`) && PathPrefix(`/v1`)
      - traefik.http.routers.trino.entrypoints=websecure
      - traefik.http.routers.trino.tls=true
      - traefik.http.routers.trino.priority=1000
      - traefik.http.services.api.loadbalancer.server.port=8081
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 5

  postgres:
    image: postgres:16
    networks: [private, public]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: demo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./tests/postgresql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./tests/example.pdf:/docker-entrypoint-initdb.d/example.pdf:ro
      - ./tests/example2.pdf:/docker-entrypoint-initdb.d/example2.pdf:ro

  trino:
    profiles: [dev, prod]
    build:
      context: ./trino
      secrets:
        - HF_TOKEN
    image: docker.io/rudymerieux/maskql-trino:${MASKQL_IMAGE_TAG:-latest}
    networks: [private, public]
    dns_search: ["${MASKQL_TRINO_DNS_SEARCH:-.}"]
    volumes:
      - trino_data:/data/trino
    environment:
      TRINO_SHARED_SECRET: ${MASKQL_TRINO_SHARED_SECRET}
      MASKQL_ENCRYPT_PASSWORD: ${MASKQL_ENCRYPT_PASSWORD}
    depends_on: [postgres]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false'"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 15s
